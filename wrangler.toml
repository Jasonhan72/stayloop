name = "stayloop"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "stayloop"

# -----------------------------------------------------------------------------
# Cloudflare Browser Rendering (Tier-2 fallback for realtor.ca scraping)
# -----------------------------------------------------------------------------
# Lib code at lib/agent/tools/import-listing.ts already calls this when
# CLOUDFLARE_BROWSER_API_TOKEN + CLOUDFLARE_ACCOUNT_ID are set in env.
# That uses the REST API (no binding needed), which is the preferred
# path for Pages Functions.
#
# If you switch to the binding mode (lower latency, no separate token),
# uncomment the lines below AND grant Browser Rendering on the project
# in Cloudflare dashboard → Workers & Pages → stayloop → Settings →
# Functions → Bindings → Add → Browser Rendering → bind name BROWSER.
#
# [[browser]]
# binding = "BROWSER"
